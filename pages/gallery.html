<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery | St Wills Academy</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body>
    <!-- NAVBAR (optional reuse) -->
    <header>
      <div class="container nav-wrapper">
        <a href="../index.html" class="logo">
          <img src="../images/logo.jpg" alt="St Wills Academy Logo" />
        </a>

        <!-- NAV LINKS -->
        <nav class="nav-links" id="navLinks">
          <a href="../index.html">Home</a>
          <a href="../pages/Programs.html">Programs</a>
          <a href="../pages/contact.html">Contact</a>
          <a href="gallery.html">Gallery</a>
        </nav>

        <!-- HAMBURGER -->
        <div class="hamburger" id="hamburger">☰</div>
      </div>
    </header>

    <!-- HERO -->
    <section class="gallery-hero">
      <h1>Our Gallery</h1>
      <p>Explore our practical sessions and classroom activities.</p>
    </section>

    <!-- GALLERY -->
    <section class="gallery-section">
      <div class="container">
        <div class="gallery-grid">
          <img
            src="../images/pratical-img1.jpeg"
            onclick="openLightbox(this)"
            alt="Chemistry practical tutor"
            loading="lazy"
          />
          <img
            src="../images/pratical-img2.jpeg"
            onclick="openLightbox(this)"
            alt="Lab session"
            loading="lazy"
          />
          <img
            src="../images/pratical-img3.jpeg"
            onclick="openLightbox(this)"
            alt="Experiment setup"
            loading="lazy"
          />
          <img
            src="../images/pratical-img4.jpeg"
            onclick="openLightbox(this)"
            alt="Teacher demonstration"
            loading="lazy"
          />
          <img
            src="../images/pratical-img5.jpeg"
            onclick="openLightbox(this)"
            alt="Students learning"
            loading="lazy"
          />
          <img
            src="../images/pratical-img6.jpeg"
            onclick="openLightbox(this)"
            alt="Group work"
            loading="lazy"
          />
          <img
            src="../images/lab1.jpg"
            onclick="openLightbox(this)"
            alt="Our lab Setup"
            loading="lazy"
          />
          <img
            src="../images/lab2.jpg"
            onclick="openLightbox(this)"
            alt="Our lab Setup"
            loading="lazy"
          />
          <img
            src="../images/lab3.jpg"
            onclick="openLightbox(this)"
            alt="Our lab Setup"
            loading="lazy"
          />
          <img
            src="../images/lab4.jpg"
            onclick="openLightbox(this)"
            alt="Our lab Setup"
            loading="lazy"
          />
          <img
            src="../images/classroom-teacher.jpg"
            onclick="openLightbox(this)"
            alt="classroom activities"
            loading="lazy"
          />
          <img
            src="../images/classroom-students.jpg"
            onclick="openLightbox(this)"
            alt="classroom activities"
            loading="lazy"
          />
        </div>
        <div id="lightbox" onclick="closeLightbox()">
          <img id="lightbox-img" />
        </div>
      </div>
    </section>
    <section class="gallery-cta">
      <h2>Ready to Join St Wills Academy?</h2>
      <p>
        Helping students achieve academic excellence through quality teaching
        and practical learning.
      </p>

      <a href="../pages/contact.html" class="btn"> Contact Us </a>
    </section>
    <div class="footer">
      <p>© 2026 St Wills Academy</p>
    </div>
    <script src="../js/script.js"></script>
  </body>
</html>
